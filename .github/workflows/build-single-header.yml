name: Build single header

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "LICENSE"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build single header (default)
        run: |
          cmake -B build-default -DCPLIB_USE_FMT_LIB=OFF
          cmake --build build-default --target single_header
          mkdir -p dist
          cp build-default/cplib.hpp dist/

      - name: Build single header (with_fmt)
        run: |
          cmake -B build-fmt -DCPLIB_USE_FMT_LIB=ON
          cmake --build build-fmt --target single_header
          mkdir -p dist/with_fmt
          cp build-fmt/cplib.hpp dist/with_fmt/

      - name: Dump git commit SHA
        run: echo "${GITHUB_SHA}" > dist/git_commit_sha.txt
        shell: bash

      - name: Commit single-header-snapshot
        uses: nicholasgriffintn/github-branch-deployment-action@1.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH: single-header-snapshot
          FOLDER: ./dist
          MESSAGE: "build: ({sha}) {msg}"
