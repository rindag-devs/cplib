name: Build single header

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "LICENSE"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Build single header (default)
        run: |
          cmake -B build-default
          cmake --build build-default --target single_header
          mkdir -p dist
          cp build-default/cplib.hpp dist/

      - name: Compile single-header consumer
        run: |
          printf '%s\n' \
            '#include "cplib.hpp"' \
            'auto main() -> int {' \
            '  cplib::Random rnd(1);' \
            '  return rnd.next(0, 10) < 0 ? 1 : 0;' \
            '}' \
            > build-default/single_header_consumer.cpp
          c++ -std=c++20 -Ibuild-default build-default/single_header_consumer.cpp -o build-default/single_header_consumer

      - name: Dump git commit SHA
        run: echo "${GITHUB_SHA}" > dist/git_commit_sha.txt
        shell: bash

      - name: Commit single-header-snapshot
        uses: EndBug/add-and-commit@v10
        with:
          add: dist --force
          message: "build: (${{ github.sha }}) ${{ github.event.head_commit.message }}"
          new_branch: single-header-snapshot
